<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Surveillance </title>

    <link rel="icon" type="image/png" href="static/1778798892950.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="static/styles.css">
</head>
<body class="login-body">
    
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-shield-alt"></i> Secure Auth</h1>
            <p>Enter your credentials to access the dashboard</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary login-btn">
                Access System <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
            <div id="loginError" class="login-error"></div>
        </form>
    </div>

    <script src="static/login.js"></script>
</body>
</html>
