<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theft-catucher-404</title>
    <link rel="icon" type="image/jpg" href="static/favicon.jpg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="static/styles.css">
    <style>
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0, 242, 254, 0.1);
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab-btn.active {
            color: #00f2fe;
            border-bottom-color: #00f2fe;
        }

        .tab-btn:hover {
            color: #00f2fe;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .success-message {
            background-color: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #4caf50;
        }

        .error-message {
            background-color: rgba(244, 67, 54, 0.1);
            color: #f44336;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #f44336;
        }
    </style>
</head>
<body class="login-body">
    
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-shield-alt"></i> Theft-catucher-404</h1>
            <p>AI Surveillance Dashboard Access</p>
        </div>

        <!-- Tabs Navigation -->
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login" onclick="switchTab('login', event)">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button class="tab-btn" data-tab="register" onclick="switchTab('register', event)">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </div>

        <!-- LOGIN TAB -->
        <div id="login" class="tab-content active">
            <form id="loginForm" class="login-form">
                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>

                <div class="input-group">
                    <label for="login_username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login_username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login_password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login_password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    Access System <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </form>
        </div>

        <!-- REGISTER TAB -->
        <div id="register" class="tab-content">
            <form id="registerForm" class="login-form">
                <div class="error-message" id="registerError"></div>
                <div class="success-message" id="registerSuccess"></div>

                <div class="input-group">
                    <label for="register_username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="register_username" name="username" placeholder="Choose a username (min 3 chars)" required minlength="3">
                    </div>
                </div>

                <div class="input-group">
                    <label for="register_password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register_password" name="password" placeholder="Create a password (min 6 chars)" required minlength="6">
                    </div>
                </div>

                <div class="input-group">
                    <label for="register_password_confirm">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register_password_confirm" name="password_confirm" placeholder="Confirm your password" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="register_email">Email (Optional)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register_email" name="email" placeholder="Enter your email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="register_fullname">Full Name (Optional)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="register_fullname" name="full_name" placeholder="Enter your full name">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    Create Account <i class="fas fa-check" style="margin-left: 8px;"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tabName, event) {
            document.getElementById('login').classList.toggle('active', tabName === 'login');
            document.getElementById('register').classList.toggle('active', tabName === 'register');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-tab') === tabName));
            clearAllMessages();
        }

        function clearAllMessages() {
            ['loginError', 'loginSuccess', 'registerError', 'registerSuccess'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
        }
    </script>
    <script src="/static/login.js"></script>
</body>
</html>
